<!DOCTYPE html>
<html>

<head>
    <title>Sign Up</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="auth-box">

    <h1>Create Account</h1>

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username">

        <input
            type="email"
            name="email"
            placeholder="Email">

        <input
            type="password"
            name="password"
            placeholder="Password">

        <input
            type="password"
            name="confirm"
            placeholder="Confirm Password">

        <button type="submit">
            Sign Up
        </button>

    </form>

    <a href="/login">
        Already have account?
    </a>

</div>

</body>
</html>
