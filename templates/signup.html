{% extends "base.html" %}

{% block title %}Signup{% endblock %}

{% block content %}

<section class="auth-page">

    <div class="auth-card">

        <h1>Create Account</h1>

        <p>Join GlyphForge.</p>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Create Account
            </button>

        </form>

        {% if error %}

            <p>{{ error }}</p>

        {% endif %}

        <a href="/login">
            Already have an account?
        </a>

    </div>

</section>

{% endblock %}
