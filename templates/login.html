<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="auth-box">

    <h1>Login</h1>

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username">

        <input
            type="password"
            name="password"
            placeholder="Password">

        <button type="submit">
            Login
        </button>

    </form>

    <a href="/signup">
        Create account
    </a>

</div>

</body>
</html>
